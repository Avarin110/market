<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoMarket | Premium Roblox Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #000; color: #fff; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); transition: 0.3s; }
        .glass:hover { border-color: rgba(255, 255, 255, 0.15); background: rgba(255, 255, 255, 0.04); }
        .gradient-text { background: linear-gradient(135deg, #fff 0%, #444 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .category-btn { transition: 0.3s; border: 1px solid rgba(255,255,255,0.05); }
        .category-btn.active { background: white; color: black; border-color: white; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        .sold-overlay { background: rgba(220, 38, 38, 0.15); backdrop-filter: grayscale(1) blur(2px); }
    </style>
</head>
<body onload="initApp()">

    <nav class="fixed w-full z-50 bg-black/90 backdrop-blur-xl border-b border-white/5 py-4 px-6 md:px-12 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 bg-white text-black flex items-center justify-center rounded-lg font-black text-xl italic">R</div>
            <span class="font-black tracking-tighter uppercase text-lg">RoMarket</span>
        </div>
        <div class="flex items-center gap-6">
            <div id="nav-user-tools" class="flex items-center gap-4"></div>
            <button onclick="toggleAuthModal()" id="auth-btn" class="bg-white text-black px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest">Sign In</button>
        </div>
    </nav>

    <section class="pt-48 pb-20 px-6 text-center">
        <div data-aos="fade-down" class="inline-block px-4 py-1 border border-white/10 rounded-full text-[9px] uppercase tracking-[0.4em] text-gray-500 mb-8">The Professional Choice</div>
        <h1 class="text-6xl md:text-9xl font-black tracking-tighter mb-8 gradient-text leading-none" data-aos="fade-up">Quality First.</h1>
        <p class="text-gray-500 max-w-xl mx-auto mb-16 text-lg" data-aos="fade-up" data-aos-delay="100">Secure high-end Roblox assets, systems, and maps engineered for performance.</p>
        
        <div class="flex flex-wrap justify-center gap-3 max-w-4xl mx-auto" data-aos="fade-up" data-aos-delay="200">
            <button onclick="filterCat('all')" class="category-btn active px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest">All</button>
            <button onclick="filterCat('Games')" class="category-btn px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest">Games</button>
            <button onclick="filterCat('Maps')" class="category-btn px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest">Maps</button>
            <button onclick="filterCat('Assets')" class="category-btn px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest">Assets</button>
            <button onclick="filterCat('Systems')" class="category-btn px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest">Systems</button>
            <button onclick="filterCat('Vehicles')" class="category-btn px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest">Vehicles</button>
            <button onclick="filterCat('GUI')" class="category-btn px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest">GUI</button>
            <button onclick="filterCat('Free Assets')" class="category-btn px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest text-blue-400">Free</button>
        </div>
    </section>

    <section class="max-w-7xl mx-auto px-6 pb-40">
        <div id="market-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
    </section>

    <div id="dev-modal" class="hidden fixed inset-0 z-[60] bg-black flex items-center justify-center p-6">
        <div class="glass w-full max-w-2xl p-10 rounded-[40px] relative">
            <button onclick="toggleDevModal()" class="absolute top-8 right-8 text-gray-500 hover:text-white text-2xl"><i class="fa-solid fa-xmark"></i></button>
            <h2 class="text-4xl font-black mb-10 italic uppercase tracking-tighter">Market Controls</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <input id="prod-name" type="text" placeholder="Product Name" class="bg-white/5 border border-white/10 p-5 rounded-2xl text-sm focus:outline-none">
                <select id="prod-cat" class="bg-black border border-white/10 p-5 rounded-2xl text-sm focus:outline-none">
                    <option value="Games">Games</option><option value="Maps">Maps</option><option value="Assets">Assets</option>
                    <option value="Buildings">Buildings</option><option value="Systems">Systems</option><option value="Vehicles">Vehicles</option>
                    <option value="Aircraft">Aircraft</option><option value="VFX">VFX</option><option value="GUI">GUI</option><option value="Free Assets">Free Assets</option>
                </select>
                <input id="prod-price" type="text" placeholder="Price (e.g. 2000 R$ / €20)" class="bg-white/5 border border-white/10 p-5 rounded-2xl text-sm md:col-span-2">
                <input id="prod-img" type="text" placeholder="Discord Image URL" class="bg-white/5 border border-white/10 p-5 rounded-2xl text-sm md:col-span-2">
                <textarea id="prod-body" placeholder="Description" class="bg-white/5 border border-white/10 p-5 rounded-2xl text-sm md:col-span-2 h-32"></textarea>
                <button onclick="addProduct()" class="md:col-span-2 bg-white text-black font-black p-5 rounded-2xl uppercase tracking-widest text-xs">Publish to RoMarket</button>
            </div>
        </div>
    </div>

    <div id="auth-modal" class="hidden fixed inset-0 z-[60] bg-black/95 backdrop-blur-2xl flex items-center justify-center p-6">
        <div class="glass w-full max-w-md p-10 rounded-[40px] relative text-center">
            <button onclick="toggleAuthModal()" class="absolute top-8 right-8 text-gray-500 hover:text-white"><i class="fa-solid fa-xmark"></i></button>
            <h2 class="text-3xl font-black mb-2 uppercase tracking-tighter italic">RoMarket Access</h2>
            <p class="text-gray-500 text-xs mb-10 tracking-widest uppercase">Unique username required</p>
            <input id="auth-user" type="text" placeholder="Choose Username" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl mb-5 text-center focus:outline-none focus:border-white">
            <button onclick="handleAuth()" class="w-full bg-white text-black font-black p-5 rounded-2xl uppercase tracking-widest text-xs">Initialize Session</button>
        </div>
    </div>

    <script>
        let currentUser = localStorage.getItem('romarket_user') || null;
        
        // ALL PRODUCTS ADDED BELOW
        let defaultProducts = [
            { id: 1, name: "Colour switch Obby", cat: "Games", price: "2000 Robux / €20", body: "High-engagement obby with color logic.", img: "https://cdn.discordapp.com/attachments/1489655597036081243/1489655597459575046/e1c7b453-df52-44f2-89c1-27733f964386.png?ex=69d1de22&is=69d08ca2&hm=9ca263340a2a10cf347132baa9fc07fdc578d7aa43ae787b03c81b35f005ad72", sold: false },
            { id: 2, name: "Obby of Love", cat: "Games", price: "3000 Robux / €30", body: "A beautifully designed themed obby.", img: "https://cdn.discordapp.com/attachments/1489650726312345770/1489650727004409906/cd702a67-3b13-499f-ae87-3350b6750213.png?ex=69d1d999&is=69d08819&hm=11264cb6bbfe87dbb550f20e48b9c15d6eebe8aa305b788fd9519aef7616f2f0", sold: false },
            { id: 3, name: "Abandoned City", cat: "Maps", price: "1000 Robux / €10", body: "Apocalypse style map.", img: "https://cdn.discordapp.com/attachments/1489278743515103426/1489278744433528943/image.png?ex=69d1d0aa&is=69d07f2a&hm=481faf838d10406edef6aabb0709b2f5bd06bde2b62935bc5f73ff600011e6bb&", sold: false },
            { id: 4, name: "Ancient Japanese Pack", cat: "Assets", price: "100 Robux / €1", body: "High quality asset pack.", img: "https://cdn.discordapp.com/attachments/1489137224514666626/1489137224716124220/image.png?ex=69d1f59d&is=69d0a41d&hm=fcb24c2b3ad104e293b6ed6734519416962f3aff4eb9d2a9813626ac4b03a07d&", sold: false },
            { id: 5, name: "Advanced Stamina", cat: "Systems", price: "49 Robux / €0.50", body: "Efficient stamina drain and regen system.", img: "https://via.placeholder.com/400x225/111/fff?text=Stamina+System", sold: false },
            { id: 6, name: "DIT PAM OBVIT", cat: "Vehicles", price: "300 Robux / €3", body: "Detailed vehicle model.", img: "https://cdn.discordapp.com/attachments/1489598146890698936/1489598147293614140/image.png?ex=69d1a8a1&is=69d05721&hm=a0e284d927e661b06df89842d07b877eb807a3b9c414fc622b04d0407f3e8824", sold: false },
            { id: 7, name: "2017 Honda NSX", cat: "Vehicles", price: "400 Robux / €4", body: "Premium car model.", img: "https://cdn.discordapp.com/attachments/1489172667931164672/1489172668333686824/Map_Testi_-_Roblox_Studio_30_04_2025_20.48.45.png?ex=69d2169f&is=69d0c51f&hm=fdebd5f7f51536f4b0697f45b9269fd2f3c38ea0e6116d76ebafd98729bc9187", sold: false },
            { id: 8, name: "Hyundai Palisade", cat: "Vehicles", price: "500 Robux / €5", body: "Detailed SUV model.", img: "https://cdn.discordapp.com/attachments/1489140723185094656/1489140724258701433/image.png?ex=69d1f8df&is=69d0a75f&hm=b47f5e11c83e9d02ca90761f138c5751f1eb0e3d9807a14c10e1cd185967607a&", sold: false },
            { id: 9, name: "Kia Bongo k2500", cat: "Vehicles", price: "300 Robux / €3", body: "High quality truck model.", img: "https://cdn.discordapp.com/attachments/1489139145631731812/1489139147208786112/Screenshot_2026-02-22_185216.png?ex=69d1f767&is=69d0a5e7&hm=5e5308de8277d24e09fb7009b331c76ad7aed63477e6faff8fb5070f918f5a4d&", sold: false },
            { id: 10, name: "3D Game Menu UI", cat: "GUI", price: "500 Robux / €5", body: "Modern 3D menu system.", img: "https://cdn.discordapp.com/attachments/1489143598485082162/1489143599848493177/image.png?ex=69d1fb8d&is=69d0aa0d&hm=5f49a1e92296c8b75000f1b50427b4c52058695aab5a419ccf57b98e59ef5121&", sold: false },
            { id: 11, name: "Vehicle Dealership UI", cat: "GUI", price: "300 Robux / €3", body: "Professional shop interface.", img: "https://cdn.discordapp.com/attachments/1489135400659320874/1489135401539993721/image.png?ex=69d1f3ea&is=69d0a26a&hm=5cb46900ec20e7299053f127e21c5398aaab8b75dec700403367999e5ed88c41&", sold: false }
        ];

        let products = JSON.parse(localStorage.getItem('romarket_prods')) || defaultProducts;

        function initApp() { AOS.init(); renderProducts(); updateUI(); }
        function toggleAuthModal() { document.getElementById('auth-modal').classList.toggle('hidden'); }
        function toggleDevModal() { document.getElementById('dev-modal').classList.toggle('hidden'); }

        function handleAuth() {
            const user = document.getElementById('auth-user').value.trim();
            if (!user) return;
            let registered = JSON.parse(localStorage.getItem('romarket_registered')) || [];
            if(registered.includes(user) && currentUser !== user) return alert("User already exists.");
            if(!registered.includes(user)) registered.push(user);
            localStorage.setItem('romarket_registered', JSON.stringify(registered));
            localStorage.setItem('romarket_user', user);
            location.reload();
        }

        function updateUI() {
            const nav = document.getElementById('nav-user-tools');
            if (currentUser) {
                document.getElementById('auth-btn').innerText = "Logout";
                document.getElementById('auth-btn').onclick = () => { localStorage.removeItem('romarket_user'); location.reload(); };
                nav.innerHTML = `<span class="text-[9px] font-bold text-gray-500 uppercase tracking-widest italic">${currentUser}</span>`;
                if (currentUser === "NightReaper") {
                    nav.innerHTML += `<button onclick="toggleDevModal()" class="bg-white/10 hover:bg-white/20 text-[9px] px-3 py-1.5 rounded-lg font-black uppercase italic">Dashboard</button>`;
                }
            }
        }

        function renderProducts(category = 'all') {
            const grid = document.getElementById('market-grid');
            grid.innerHTML = '';
            const filtered = category === 'all' ? products : products.filter(p => p.cat === category);
            
            filtered.forEach(p => {
                grid.innerHTML += `
                    <div class="glass p-6 rounded-[32px] relative group ${p.sold ? 'opacity-50 grayscale' : ''}" data-aos="fade-up">
                        <div class="aspect-video rounded-2xl overflow-hidden mb-6 relative border border-white/5">
                            <img src="${p.img}" class="w-full h-full object-cover">
                            ${p.sold ? '<div class="absolute inset-0 sold-overlay flex items-center justify-center font-black text-3xl uppercase -rotate-12 border-2 border-red-600/50">SOLD OUT</div>' : ''}
                        </div>
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="font-black text-lg tracking-tighter uppercase italic">${p.name}</h3>
                            <span class="text-[8px] bg-white/5 px-2 py-1 rounded-lg uppercase font-black tracking-widest text-gray-400">${p.cat}</span>
                        </div>
                        <p class="text-gray-500 text-xs mb-8 h-8 overflow-hidden">${p.body}</p>
                        <div class="flex justify-between items-center mb-8">
                            <span class="font-black text-xl">${p.price}</span>
                        </div>
                        <div class="flex gap-2">
                            <a href="https://discord.gg/b5zmpYSuRf" class="flex-1 bg-white text-black text-center py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest">Secure Asset</a>
                            ${currentUser === "NightReaper" ? `<button onclick="toggleSold(${p.id})" class="bg-red-600/10 text-red-500 px-4 rounded-2xl text-[8px] font-black uppercase">Sold</button>` : ''}
                        </div>
                    </div>
                `;
            });
        }

        function addProduct() {
            const name = document.getElementById('prod-name').value;
            if(!name) return;
            const newProd = {
                id: Date.now(),
                name: name,
                cat: document.getElementById('prod-cat').value,
                price: document.getElementById('prod-price').value,
                img: document.getElementById('prod-img').value,
                body: document.getElementById('prod-body').value,
                sold: false
            };
            products.unshift(newProd);
            localStorage.setItem('romarket_prods', JSON.stringify(products));
            location.reload();
        }

        function toggleSold(id) {
            products = products.map(p => p.id === id ? {...p, sold: !p.sold} : p);
            localStorage.setItem('romarket_prods', JSON.stringify(products));
            renderProducts();
        }

        function filterCat(cat) {
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderProducts(cat);
        }
    </script>
</body>
</html>
