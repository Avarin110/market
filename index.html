<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoMarket | Premium Roblox Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #000; color: #fff; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); transition: 0.3s; }
        .gradient-text { background: linear-gradient(135deg, #fff 0%, #444 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .category-btn { transition: 0.3s; border: 1px solid rgba(255,255,255,0.05); color: #666; }
        .category-btn.active { background: white; color: black; border-color: white; }
        .no-img-card { background: linear-gradient(145deg, #0a0a0a, #111); border: 1px dashed rgba(255,255,255,0.1); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    </style>
</head>
<body onload="initApp()">

    <nav class="fixed w-full z-50 bg-black/90 backdrop-blur-xl border-b border-white/5 py-4 px-6 md:px-12 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 bg-white text-black flex items-center justify-center rounded-lg font-black text-xl italic">R</div>
            <span class="font-black tracking-tighter uppercase text-lg">RoMarket</span>
        </div>
        <div class="flex items-center gap-6">
            <div id="nav-user-tools" class="flex items-center gap-4"></div>
            <button onclick="toggleAuthModal()" id="auth-btn" class="bg-white text-black px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest">Sign In</button>
        </div>
    </nav>

    <section class="pt-48 pb-10 px-6 text-center">
        <h1 class="text-6xl md:text-9xl font-black tracking-tighter mb-8 gradient-text leading-none" data-aos="fade-up">RoMarket.</h1>
        <div class="flex flex-wrap justify-center gap-3 max-w-5xl mx-auto mb-10" data-aos="fade-up">
            <button onclick="filterCat('all', this)" class="category-btn active px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest">All</button>
            <button onclick="filterCat('Games', this)" class="category-btn px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest">Games</button>
            <button onclick="filterCat('Maps', this)" class="category-btn px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest">Maps</button>
            <button onclick="filterCat('Assets', this)" class="category-btn px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest">Assets</button>
            <button onclick="filterCat('Systems', this)" class="category-btn px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest">Systems</button>
            <button onclick="filterCat('Vehicles', this)" class="category-btn px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest">Vehicles</button>
            <button onclick="filterCat('Buildings', this)" class="category-btn px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest">Buildings</button>
            <button onclick="filterCat('Aircraft', this)" class="category-btn px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest">Aircraft</button>
            <button onclick="filterCat('GUI', this)" class="category-btn px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest">GUI</button>
        </div>
    </section>

    <section class="max-w-7xl mx-auto px-6 pb-40">
        <div id="market-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
    </section>

    <div id="dev-modal" class="hidden fixed inset-0 z-[60] bg-black flex items-center justify-center p-6">
        <div class="glass w-full max-w-2xl p-10 rounded-[40px] relative">
            <button onclick="toggleDevModal()" class="absolute top-8 right-8 text-gray-500 hover:text-white text-2xl"><i class="fa-solid fa-xmark"></i></button>
            <h2 class="text-4xl font-black mb-10 italic uppercase tracking-tighter">Admin Panel</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <input id="prod-name" type="text" placeholder="Product Name" class="bg-white/5 border border-white/10 p-5 rounded-2xl text-sm focus:outline-none text-white">
                <select id="prod-cat" class="bg-black border border-white/10 p-5 rounded-2xl text-sm focus:outline-none text-white">
                    <option value="Games">Games</option><option value="Maps">Maps</option><option value="Assets">Assets</option>
                    <option value="Buildings">Buildings</option><option value="Systems">Systems</option><option value="Vehicles">Vehicles</option>
                    <option value="Aircraft">Aircraft</option><option value="GUI">GUI</option>
                </select>
                <input id="prod-price" type="text" placeholder="Price (e.g. 100 Robux / €1)" class="bg-white/5 border border-white/10 p-5 rounded-2xl text-sm md:col-span-2 text-white">
                <input id="prod-img" type="text" placeholder="Image URL (Leave blank for technical cards)" class="bg-white/5 border border-white/10 p-5 rounded-2xl text-sm md:col-span-2 text-white">
                <textarea id="prod-body" placeholder="Description" class="bg-white/5 border border-white/10 p-5 rounded-2xl text-sm md:col-span-2 h-32 text-white"></textarea>
                <button onclick="addProduct()" class="md:col-span-2 bg-white text-black font-black p-5 rounded-2xl uppercase tracking-widest text-xs">Publish to Market</button>
            </div>
        </div>
    </div>

    <div id="auth-modal" class="hidden fixed inset-0 z-[60] bg-black/95 backdrop-blur-2xl flex items-center justify-center p-6">
        <div class="glass w-full max-w-md p-10 rounded-[40px] relative text-center">
            <button onclick="toggleAuthModal()" class="absolute top-8 right-8 text-gray-500 hover:text-white"><i class="fa-solid fa-xmark"></i></button>
            <h2 class="text-3xl font-black mb-10 italic">Login</h2>
            <p class="text-gray-500 text-xs mb-6 uppercase tracking-widest">Sign in as NightReaper to access Admin tools</p>
            <input id="auth-user" type="text" placeholder="Username" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl mb-5 text-center focus:outline-none text-white">
            <button onclick="handleAuth()" class="w-full bg-white text-black font-black p-5 rounded-2xl uppercase tracking-widest text-xs">Authorize</button>
        </div>
    </div>

    <script>
        let currentUser = localStorage.getItem('romarket_user') || null;
        
        const defaultProducts = [
            { id: 101, name: "Ancient Japanese Pack", cat: "Assets", price: "100 Robux / €1", body: "Ancient themed models.", img: "https://cdn.discordapp.com/attachments/1489137224514666626/1489137224716124220/image.png", sold: false },
            { id: 201, name: "Advanced Stamina", cat: "Systems", price: "49 Robux / €50", body: "Optimized drain/regen system.", img: "", sold: false },
            { id: 202, name: "Distance Notifier", cat: "Systems", price: "300 Robux / €3", body: "Real-time distance logic.", img: "", sold: false },
            { id: 203, name: "Highway Traffic", cat: "Systems", price: "200 Robux / €2", body: "Realistic traffic flow.", img: "", sold: false },
            { id: 301, name: "DIT PAM OBVIT", cat: "Vehicles", price: "300 Robux / €3", body: "Premium vehicle chassis.", img: "https://cdn.discordapp.com/attachments/1489598146890698936/1489598147293614140/image.png", sold: false },
            { id: 302, name: "Hyundai Palisade Waltup", cat: "Vehicles", price: "500 Robux / €5", body: "Detailed SUV mesh.", img: "https://cdn.discordapp.com/attachments/1489140723185094656/1489140724258701433/image.png", sold: false },
            { id: 303, name: "KIA BONGO k2500 DLX", cat: "Vehicles", price: "300 Robux / €3", body: "Utility truck model.", img: "https://cdn.discordapp.com/attachments/1489139145631731812/1489139147208786112/Screenshot_2026-02-22_185216.png", sold: false },
            { id: 401, name: "3D Game Menu", cat: "GUI", price: "500 Robux / €5", body: "Interactive 3D UI menu.", img: "https://cdn.discordapp.com/attachments/1489143598485082162/1489143599495909416/image.png", sold: false },
            { id: 402, name: "Vehicle Dealership UI", cat: "GUI", price: "300 Robux / €3", body: "Clean shop interface.", img: "https://cdn.discordapp.com/attachments/1489135400659320874/1489135401539993721/image.png", sold: false }
        ];

        // Merge local storage products with hardcoded ones
        let storedProducts = JSON.parse(localStorage.getItem('romarket_prods')) || [];
        let products = [...storedProducts, ...defaultProducts];

        function initApp() { AOS.init(); renderProducts(); updateUI(); }
        function toggleAuthModal() { document.getElementById('auth-modal').classList.toggle('hidden'); }
        function toggleDevModal() { document.getElementById('dev-modal').classList.toggle('hidden'); }

        function handleAuth() {
            const user = document.getElementById('auth-user').value.trim();
            if (!user) return;
            localStorage.setItem('romarket_user', user);
            location.reload();
        }

        function updateUI() {
            const nav = document.getElementById('nav-user-tools');
            if (currentUser) {
                document.getElementById('auth-btn').innerText = "Logout";
                document.getElementById('auth-btn').onclick = () => { localStorage.removeItem('romarket_user'); location.reload(); };
                nav.innerHTML = `<span class="text-[9px] font-bold text-gray-500 italic uppercase tracking-widest">${currentUser}</span>`;
                if (currentUser === "NightReaper") {
                    nav.innerHTML += `<button onclick="toggleDevModal()" class="bg-white/10 px-3 py-1 rounded-lg text-[9px] font-black uppercase tracking-widest">Admin</button>`;
                }
            }
        }

        function addProduct() {
            const name = document.getElementById('prod-name').value;
            if(!name) return;
            const newProd = {
                id: Date.now(),
                name: name,
                cat: document.getElementById('prod-cat').value,
                price: document.getElementById('prod-price').value,
                img: document.getElementById('prod-img').value,
                body: document.getElementById('prod-body').value,
                sold: false
            };
            storedProducts.unshift(newProd);
            localStorage.setItem('romarket_prods', JSON.stringify(storedProducts));
            location.reload();
        }

        function renderProducts(category = 'all') {
            const grid = document.getElementById('market-grid');
            grid.innerHTML = '';
            const filtered = category === 'all' ? products : products.filter(p => p.cat === category);
            
            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full py-24 text-center border border-white/5 rounded-[40px] bg-white/[0.01]" data-aos="zoom-in">
                        <i class="fa-solid fa-layer-group text-4xl mb-6 text-white/10"></i>
                        <h3 class="text-2xl font-black italic uppercase tracking-tighter mb-2">Nothing to see here...</h3>
                        <p class="text-gray-500 mb-8 text-sm max-w-xs mx-auto">Join our discord server for more updates and new releases.</p>
                        <a href="https://discord.gg/b5zmpYSuRf" class="bg-white text-black px-10 py-4 rounded-2xl font-black text-xs uppercase tracking-widest inline-block transition hover:scale-105">Join Discord</a>
                    </div>
                `;
                return;
            }

            filtered.forEach(p => {
                const imgHtml = p.img 
                    ? `<img src="${p.img}" class="w-full h-full object-cover">`
                    : `<div class="w-full h-full no-img-card flex flex-col items-center justify-center p-6 text-center">
                        <i class="fa-solid fa-code text-white/10 text-4xl mb-4"></i>
                        <span class="text-[10px] font-black uppercase tracking-widest text-gray-600 italic">Technical Script</span>
                       </div>`;

                grid.innerHTML += `
                    <div class="glass p-6 rounded-[32px] group" data-aos="fade-up">
                        <div class="aspect-video rounded-2xl overflow-hidden mb-6 relative border border-white/5 bg-neutral-900">
                            ${imgHtml}
                        </div>
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="font-black text-lg uppercase italic tracking-tighter">${p.name}</h3>
                            <span class="text-[8px] bg-white/5 px-2 py-1 rounded-lg uppercase font-black text-gray-400 tracking-widest">${p.cat}</span>
                        </div>
                        <p class="text-gray-500 text-xs mb-8 h-8 overflow-hidden">${p.body}</p>
                        <div class="flex justify-between items-center mb-8">
                            <span class="font-black text-xl italic">${p.price}</span>
                        </div>
                        <a href="https://discord.gg/b5zmpYSuRf" class="block w-full bg-white text-black text-center py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-gray-200 transition">Buy Now</a>
                    </div>
                `;
            });
        }

        function filterCat(cat, btn) {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderProducts(cat);
        }
    </script>
</body>
</html>
