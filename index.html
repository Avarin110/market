<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoMarket | Premium Roblox Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #000; color: #fff; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); transition: 0.3s; }
        .gradient-text { background: linear-gradient(135deg, #fff 0%, #444 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .category-btn.active { background: white; color: black; border-color: white; }
        .no-img-card { background: linear-gradient(145deg, #0a0a0a, #111); border: 1px dashed rgba(255,255,255,0.1); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    </style>
</head>
<body onload="initApp()">

    <nav class="fixed w-full z-50 bg-black/90 backdrop-blur-xl border-b border-white/5 py-4 px-6 md:px-12 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 bg-white text-black flex items-center justify-center rounded-lg font-black text-xl italic">R</div>
            <span class="font-black tracking-tighter uppercase text-lg">RoMarket</span>
        </div>
        <div class="flex items-center gap-6">
            <div id="nav-user-tools" class="flex items-center gap-4"></div>
            <button onclick="toggleAuthModal()" id="auth-btn" class="bg-white text-black px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest">Sign In</button>
        </div>
    </nav>

    <section class="pt-48 pb-10 px-6 text-center">
        <h1 class="text-6xl md:text-9xl font-black tracking-tighter mb-8 gradient-text leading-none" data-aos="fade-up">RoMarket.</h1>
        <div class="flex flex-wrap justify-center gap-3 max-w-5xl mx-auto mb-10" data-aos="fade-up">
            <button onclick="filterCat('all')" class="category-btn active px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest border border-white/5">All</button>
            <button onclick="filterCat('Games')" class="category-btn px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest border border-white/5">Games</button>
            <button onclick="filterCat('Maps')" class="category-btn px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest border border-white/5">Maps</button>
            <button onclick="filterCat('Assets')" class="category-btn px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest border border-white/5">Assets</button>
            <button onclick="filterCat('Systems')" class="category-btn px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest border border-white/5">Systems</button>
            <button onclick="filterCat('Vehicles')" class="category-btn px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest border border-white/5">Vehicles</button>
            <button onclick="filterCat('Buildings')" class="category-btn px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest border border-white/5">Buildings</button>
            <button onclick="filterCat('Aircraft')" class="category-btn px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest border border-white/5">Aircraft</button>
            <button onclick="filterCat('GUI')" class="category-btn px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest border border-white/5">GUI</button>
        </div>
    </section>

    <section class="max-w-7xl mx-auto px-6 pb-40">
        <div id="market-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
    </section>

    <div id="dev-modal" class="hidden fixed inset-0 z-[60] bg-black flex items-center justify-center p-6">
        <div class="glass w-full max-w-2xl p-10 rounded-[40px] relative">
            <button onclick="toggleDevModal()" class="absolute top-8 right-8 text-gray-500 hover:text-white text-2xl"><i class="fa-solid fa-xmark"></i></button>
            <h2 class="text-4xl font-black mb-10 italic uppercase tracking-tighter">Market Controls</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <input id="prod-name" type="text" placeholder="Product Name" class="bg-white/5 border border-white/10 p-5 rounded-2xl text-sm focus:outline-none text-white">
                <select id="prod-cat" class="bg-black border border-white/10 p-5 rounded-2xl text-sm focus:outline-none text-white">
                    <option value="Games">Games</option><option value="Maps">Maps</option><option value="Assets">Assets</option>
                    <option value="Buildings">Buildings</option><option value="Systems">Systems</option><option value="Vehicles">Vehicles</option>
                    <option value="Aircraft">Aircraft</option><option value="GUI">GUI</option>
                </select>
                <input id="prod-price" type="text" placeholder="Price (e.g. 2000 R$ / €20)" class="bg-white/5 border border-white/10 p-5 rounded-2xl text-sm md:col-span-2 text-white">
                <input id="prod-img" type="text" placeholder="Discord Image URL (Optional)" class="bg-white/5 border border-white/10 p-5 rounded-2xl text-sm md:col-span-2 text-white">
                <textarea id="prod-body" placeholder="Description" class="bg-white/5 border border-white/10 p-5 rounded-2xl text-sm md:col-span-2 h-32 text-white"></textarea>
                <button onclick="addProduct()" class="md:col-span-2 bg-white text-black font-black p-5 rounded-2xl uppercase tracking-widest text-xs">Publish Item</button>
            </div>
        </div>
    </div>

    <div id="auth-modal" class="hidden fixed inset-0 z-[60] bg-black/95 backdrop-blur-2xl flex items-center justify-center p-6">
        <div class="glass w-full max-w-md p-10 rounded-[40px] relative text-center">
            <button onclick="toggleAuthModal()" class="absolute top-8 right-8 text-gray-500 hover:text-white"><i class="fa-solid fa-xmark"></i></button>
            <h2 class="text-3xl font-black mb-2 uppercase tracking-tighter italic">Sign In</h2>
            <input id="auth-user" type="text" placeholder="Username" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl mb-5 text-center focus:outline-none text-white">
            <button onclick="handleAuth()" class="w-full bg-white text-black font-black p-5 rounded-2xl uppercase tracking-widest text-xs">Login</button>
        </div>
    </div>

    <script>
        let currentUser = localStorage.getItem('romarket_user') || null;
        
        const defaultProducts = [
            // GAMES
            { id: 1, name: "Colour switch Obby", cat: "Games", price: "2000 Robux / €20", body: "High-engagement color match obby.", img: "https://cdn.discordapp.com/attachments/1489655597036081243/1489655597459575046/e1c7b453-df52-44f2-89c1-27733f964386.png?ex=69d1de22&is=69d08ca2&hm=9ca263340a2a10cf347132baa9fc07fdc578d7aa43ae787b03c81b35f005ad72", sold: false },
            { id: 2, name: "Obby of Love", cat: "Games", price: "3000 Robux / €30", body: "Themed obstacle course.", img: "https://cdn.discordapp.com/attachments/1489650726312345770/1489650727004409906/cd702a67-3b13-499f-ae87-3350b6750213.png?ex=69d1d999&is=69d08819&hm=11264cb6bbfe87dbb550f20e48b9c15d6eebe8aa305b788fd9519aef7616f2f0", sold: false },
            // MAPS
            { id: 3, name: "Abandoned City", cat: "Maps", price: "1000 Robux / €10", body: "Apocalypse detailed map.", img: "https://cdn.discordapp.com/attachments/1489278743515103426/1489278744433528943/image.png?ex=69d1d0aa&is=69d07f2a&hm=481faf838d10406edef6aabb0709b2f5bd06bde2b62935bc5f73ff600011e6bb&", sold: false },
            // ASSETS
            { id: 4, name: "Ancient Japanese Pack", cat: "Assets", price: "100 Robux / €1", body: "Collection of ancient Japanese themed models.", img: "https://cdn.discordapp.com/attachments/1489137224514666626/1489137224716124220/image.png?ex=69d1f59d&is=69d0a41d&hm=fcb24c2b3ad104e293b6ed6734519416962f3aff4eb9d2a9813626ac4b03a07d&", sold: false },
            // SYSTEMS
            { id: 5, name: "Advanced Stamina", cat: "Systems", price: "49 Robux / €50", body: "High-performance stamina management system.", img: "", sold: false },
            { id: 6, name: "Distance Notifier", cat: "Systems", price: "300 Robux / €3", body: "Real-time distance tracking system.", img: "", sold: false },
            { id: 7, name: "Highway Traffic", cat: "Systems", price: "200 Robux / €2", body: "Optimized traffic flow system.", img: "", sold: false },
            // VEHICLES
            { id: 8, name: "DIT PAM OBVIT", cat: "Vehicles", price: "300 Robux / €3", body: "Premium vehicle chassis.", img: "https://cdn.discordapp.com/attachments/1489598146890698936/1489598147293614140/image.png?ex=69d1a8a1&is=69d05721&hm=a0e284d927e661b06df89842d07b877eb807a3b9c414fc622b04d0407f3e8824", sold: false },
            { id: 9, name: "Hyundai Palisade", cat: "Vehicles", price: "500 Robux / €5", body: "Detailed Waltup edition SUV.", img: "https://cdn.discordapp.com/attachments/1489140723185094656/1489140724258701433/image.png?ex=69d1f8df&is=69d0a75f&hm=b47f5e11c83e9d02ca90761f138c5751f1eb0e3d9807a14c10e1cd185967607a&", sold: false },
            { id: 10, name: "KIA BONGO k2500 DLX", cat: "Vehicles", price: "300 Robux / €3", body: "Professional light truck model.", img: "https://cdn.discordapp.com/attachments/1489139145631731812/1489139147208786112/Screenshot_2026-02-22_185216.png?ex=69d1f767&is=69d0a5e7&hm=5e5308de8277d24e09fb7009b331c76ad7aed63477e6faff8fb5070f918f5a4d&", sold: false },
            // GUI
            { id: 11, name: "3D Game Menu", cat: "GUI", price: "500 Robux / €5", body: "Immersive 3D user interface.", img: "https://cdn.discordapp.com/attachments/1489143598485082162/1489143599495909416/image.png?ex=69d1fb8d&is=69d0aa0d&hm=e06283a3a57e50c91b45d3de310f1141ee87b5a22ae6d0ba6e8868c10f164e2f&", sold: false },
            { id: 12, name: "Vehicle Dealership UI", cat: "GUI", price: "300 Robux / €3", body: "Clean, functional shop GUI.", img: "https://cdn.discordapp.com/attachments/1489135400659320874/1489135401539993721/image.png?ex=69d1f3ea&is=69d0a26a&hm=5cb46900ec20e7299053f127e21c5398aaab8b75dec700403367999e5ed88c41&", sold: false }
        ];

        let products = JSON.parse(localStorage.getItem('romarket_prods')) || defaultProducts;

        function initApp() { AOS.init(); renderProducts(); updateUI(); }
        function toggleAuthModal() { document.getElementById('auth-modal').classList.toggle('hidden'); }
        function toggleDevModal() { document.getElementById('dev-modal').classList.toggle('hidden'); }

        function handleAuth() {
            const user = document.getElementById('auth-user').value.trim();
            if (!user) return;
            localStorage.setItem('romarket_user', user);
            location.reload();
        }

        function updateUI() {
            const nav = document.getElementById('nav-user-tools');
            if (currentUser) {
                document.getElementById('auth-btn').innerText = "Logout";
                document.getElementById('auth-btn').onclick = () => { localStorage.removeItem('romarket_user'); location.reload(); };
                nav.innerHTML = `<span class="text-[9px] font-bold text-gray-500 italic uppercase tracking-widest">${currentUser}</span>`;
                if (currentUser === "NightReaper") {
                    nav.innerHTML += `<button onclick="toggleDevModal()" class="bg-white/10 px-3 py-1 rounded-lg text-[9px] font-black uppercase">Admin</button>`;
                }
            }
        }

        function renderProducts(category = 'all') {
            const grid = document.getElementById('market-grid');
            grid.innerHTML = '';
            
            const filtered = category === 'all' ? products : products.filter(p => p.cat === category);
            
            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full py-20 text-center border border-white/5 rounded-[40px] bg-white/[0.02]" data-aos="zoom-in">
                        <i class="fa-solid fa-clock-rotate-left text-4xl mb-6 text-white/20"></i>
                        <h3 class="text-2xl font-black italic uppercase tracking-tighter mb-2">Nothing here...</h3>
                        <p class="text-gray-500 mb-8 text-sm">Stay tuned for more updates join our discord server.</p>
                        <a href="https://discord.gg/b5zmpYSuRf" class="bg-white text-black px-10 py-4 rounded-2xl font-black text-xs uppercase tracking-widest inline-block">Join Discord</a>
                    </div>
                `;
                return;
            }

            filtered.forEach(p => {
                const imgHtml = p.img 
                    ? `<img src="${p.img}" class="w-full h-full object-cover">`
                    : `<div class="w-full h-full no-img-card flex flex-col items-center justify-center p-6 text-center">
                        <i class="fa-solid fa-code text-white/10 text-4xl mb-4"></i>
                        <span class="text-[10px] font-black uppercase tracking-widest text-gray-600 italic">Technical Script</span>
                       </div>`;

                grid.innerHTML += `
                    <div class="glass p-6 rounded-[32px] group ${p.sold ? 'opacity-40 grayscale' : ''}" data-aos="fade-up">
                        <div class="aspect-video rounded-2xl overflow-hidden mb-6 relative border border-white/5">
                            ${imgHtml}
                            ${p.sold ? '<div class="absolute inset-0 bg-red-600/40 flex items-center justify-center font-black text-3xl uppercase -rotate-12 border-2 border-red-600">SOLD</div>' : ''}
                        </div>
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="font-black text-lg uppercase italic tracking-tighter">${p.name}</h3>
                            <span class="text-[8px] bg-white/5 px-2 py-1 rounded-lg uppercase font-black text-gray-400 tracking-widest">${p.cat}</span>
                        </div>
                        <p class="text-gray-500 text-xs mb-8 h-8">${p.body}</p>
                        <div class="flex justify-between items-center mb-8">
                            <span class="font-black text-xl italic">${p.price}</span>
                        </div>
                        <div class="flex gap-2">
                            <a href="https://discord.gg/b5zmpYSuRf" class="flex-1 bg-white text-black text-center py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-gray-200 transition">Buy Now</a>
                            ${currentUser === "NightReaper" ? `<button onclick="toggleSold(${p.id})" class="bg-red-600/10 text-red-500 px-4 rounded-2xl text-[8px] font-black uppercase">Flip Sold</button>` : ''}
                        </div>
                    </div>
                `;
            });
        }

        function addProduct() {
            const name = document.getElementById('prod-name').value;
            if(!name) return;
            products.unshift({
                id: Date.now(),
                name: name,
                cat: document.getElementById('prod-cat').value,
                price: document.getElementById('prod-price').value,
                img: document.getElementById('prod-img').value,
                body: document.getElementById('prod-body').value,
                sold: false
            });
            localStorage.setItem('romarket_prods', JSON.stringify(products));
            location.reload();
        }

        function toggleSold(id) {
            products = products.map(p => p.id === id ? {...p, sold: !p.sold} : p);
            localStorage.setItem('romarket_prods', JSON.stringify(products));
            renderProducts();
        }

        function filterCat(cat) {
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            renderProducts(cat);
        }
    </script>
</body>
</html>
