<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoMarket | Premium Roblox Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #000; color: #fff; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); transition: 0.3s; }
        .gradient-text { background: linear-gradient(135deg, #fff 0%, #444 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .category-btn { transition: 0.3s; border: 1px solid rgba(255,255,255,0.05); color: #666; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; padding: 10px 20px; border-radius: 12px; }
        .category-btn.active { background: white; color: black; border-color: white; }
        .no-img-card { background: linear-gradient(145deg, #111, #000); border: 1px dashed rgba(255,255,255,0.1); }
    </style>
</head>
<body onload="initApp()">

    <nav class="fixed w-full z-50 bg-black/90 backdrop-blur-xl border-b border-white/5 py-4 px-6 md:px-12 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 bg-white text-black flex items-center justify-center rounded-lg font-black text-xl italic">R</div>
            <span class="font-black tracking-tighter uppercase text-lg">RoMarket</span>
        </div>
        <div class="flex items-center gap-6">
            <div id="nav-user-tools" class="flex items-center gap-4"></div>
            <button onclick="toggleAuthModal()" id="auth-btn" class="bg-white text-black px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest">Sign In</button>
        </div>
    </nav>

    <section class="pt-48 pb-10 px-6 text-center">
        <h1 class="text-6xl md:text-9xl font-black tracking-tighter mb-8 gradient-text leading-none" data-aos="fade-up">RoMarket.</h1>
        <div class="flex flex-wrap justify-center gap-3 max-w-5xl mx-auto mb-10" data-aos="fade-up">
            <button onclick="filterCat('all', this)" class="category-btn active">All</button>
            <button onclick="filterCat('Assets', this)" class="category-btn">Assets</button>
            <button onclick="filterCat('Systems', this)" class="category-btn">Systems</button>
            <button onclick="filterCat('Vehicles', this)" class="category-btn">Vehicles</button>
            <button onclick="filterCat('GUI', this)" class="category-btn">GUI</button>
        </div>
    </section>

    <section class="max-w-7xl mx-auto px-6 pb-40">
        <div id="market-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
    </section>

    <div id="dev-modal" class="hidden fixed inset-0 z-[60] bg-black/95 flex items-center justify-center p-6">
        <div class="glass w-full max-w-2xl p-10 rounded-[40px] relative">
            <button onclick="toggleDevModal()" class="absolute top-8 right-8 text-gray-500 hover:text-white text-2xl"><i class="fa-solid fa-xmark"></i></button>
            <h2 class="text-4xl font-black mb-10 italic uppercase tracking-tighter">Admin Dashboard</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <input id="prod-name" type="text" placeholder="Name" class="bg-white/5 border border-white/10 p-5 rounded-2xl text-white outline-none">
                <select id="prod-cat" class="bg-black border border-white/10 p-5 rounded-2xl text-white outline-none">
                    <option value="Assets">Assets</option>
                    <option value="Systems">Systems</option>
                    <option value="Vehicles">Vehicles</option>
                    <option value="GUI">GUI</option>
                </select>
                <input id="prod-price" type="text" placeholder="Price (Robux/Euro)" class="bg-white/5 border border-white/10 p-5 rounded-2xl text-white md:col-span-2 outline-none">
                <input id="prod-img" type="text" placeholder="Image Link" class="bg-white/5 border border-white/10 p-5 rounded-2xl text-white md:col-span-2 outline-none">
                <textarea id="prod-body" placeholder="Description" class="bg-white/5 border border-white/10 p-5 rounded-2xl text-white md:col-span-2 h-32 outline-none"></textarea>
                <button onclick="addProduct()" class="md:col-span-2 bg-white text-black font-black p-5 rounded-2xl uppercase tracking-widest text-xs">Post Product</button>
            </div>
        </div>
    </div>

    <div id="auth-modal" class="hidden fixed inset-0 z-[60] bg-black/95 flex items-center justify-center p-6">
        <div class="glass w-full max-w-md p-10 rounded-[40px] relative text-center">
            <button onclick="toggleAuthModal()" class="absolute top-8 right-8 text-gray-500 hover:text-white"><i class="fa-solid fa-xmark"></i></button>
            <h2 class="text-3xl font-black mb-6 italic">Sign In</h2>
            <input id="auth-user" type="text" placeholder="Username" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl mb-5 text-center text-white outline-none">
            <button onclick="handleAuth()" class="w-full bg-white text-black font-black p-5 rounded-2xl uppercase tracking-widest text-xs">Enter</button>
        </div>
    </div>

    <script>
        let currentUser = localStorage.getItem('romarket_user') || null;
        
        const defaultProducts = [
            // ASSETS
            { id: 101, name: "Ancient Japanese Pack", cat: "Assets", price: "100 Robux / €1", body: "High-quality ancient style environment assets.", img: "https://cdn.discordapp.com/attachments/1489137224514666626/1489137224716124220/image.png?ex=69d1f59d&is=69d0a41d&hm=fcb24c2b3ad104e293b6ed6734519416962f3aff4eb9d2a9813626ac4b03a07d&", sold: false },
            
            // SYSTEMS
            { id: 201, name: "Advanced Stamina", cat: "Systems", price: "49 Robux / €50", body: "Efficient drain and regeneration system.", img: "", sold: false },
            { id: 202, name: "Distance Notifier", cat: "Systems", price: "300 Robux / €3", body: "Real-time player distance notifications.", img: "", sold: false },
            { id: 203, name: "Highway Traffic", cat: "Systems", price: "200 Robux / €2", body: "Optimized AI traffic for highway games.", img: "", sold: false },
            
            // VEHICLES
            { id: 301, name: "DIT PAM OBVIT", cat: "Vehicles", price: "300 Robux / €3", body: "Premium vehicle model and chassis.", img: "https://cdn.discordapp.com/attachments/1489598146890698936/1489598147293614140/image.png?ex=69d1a8a1&is=69d05721&hm=a0e284d927e661b06df89842d07b877eb807a3b9c414fc622b04d0407f3e8824", sold: false },
            { id: 302, name: "Hyundai Palisade Waltup", cat: "Vehicles", price: "500 Robux / €5", body: "Detailed SUV for simulation games.", img: "https://cdn.discordapp.com/attachments/1489140723185094656/1489140724258701433/image.png?ex=69d1f8df&is=69d0a75f&hm=b47f5e11c83e9d02ca90761f138c5751f1eb0e3d9807a14c10e1cd185967607a&", sold: false },
            { id: 303, name: "KIA BONGO k2500 DLX", cat: "Vehicles", price: "300 Robux / €3", body: "High-quality industrial truck model.", img: "https://cdn.discordapp.com/attachments/1489139145631731812/1489139147208786112/Screenshot_2026-02-22_185216.png?ex=69d1f767&is=69d0a5e7&hm=5e5308de8277d24e09fb7009b331c76ad7aed63477e6faff8fb5070f918f5a4d&", sold: false },
            
            // GUI
            { id: 401, name: "3D Game Menu", cat: "GUI", price: "500 Robux / €5", body: "Animated 3D user interface for menus.", img: "https://cdn.discordapp.com/attachments/1489143598485082162/1489143599495909416/image.png?ex=69d1fb8d&is=69d0aa0d&hm=e06283a3a57e50c91b45d3de310f1141ee87b5a22ae6d0ba6e8868c10f164e2f&", sold: false },
            { id: 402, name: "Vehicle Dealership UI", cat: "GUI", price: "300 Robux / €3", body: "Clean vehicle shop/dealership interface.", img: "https://cdn.discordapp.com/attachments/1489135400659320874/1489135401539993721/image.png?ex=69d1f3ea&is=69d0a26a&hm=5cb46900ec20e7299053f127e21c5398aaab8b75dec700403367999e5ed88c41&", sold: false }
        ];

        let storedProducts = JSON.parse(localStorage.getItem('romarket_prods')) || [];
        let products = [...storedProducts, ...defaultProducts];

        function initApp() { AOS.init(); renderProducts(); updateUI(); }
        function toggleAuthModal() { document.getElementById('auth-modal').classList.toggle('hidden'); }
        function toggleDevModal() { document.getElementById('dev-modal').classList.toggle('hidden'); }

        function handleAuth() {
            const user = document.getElementById('auth-user').value.trim();
            if (!user) return;
            localStorage.setItem('romarket_user', user);
            location.reload();
        }

        function updateUI() {
            const nav = document.getElementById('nav-user-tools');
            if (currentUser) {
                document.getElementById('auth-btn').innerText = "Logout";
                document.getElementById('auth-btn').onclick = () => { localStorage.removeItem('romarket_user'); location.reload(); };
                nav.innerHTML = `<span class="text-[9px] font-bold text-gray-500 italic uppercase tracking-widest">${currentUser}</span>`;
                if (currentUser === "NightReaper") {
                    nav.innerHTML += `<button onclick="toggleDevModal()" class="bg-white/10 px-3 py-1 rounded-lg text-[9px] font-black uppercase">Admin</button>`;
                }
            }
        }

        function addProduct() {
            const name = document.getElementById('prod-name').value;
            if(!name) return;
            const newProd = {
                id: Date.now(),
                name: name,
                cat: document.getElementById('prod-cat').value,
                price: document.getElementById('prod-price').value,
                img: document.getElementById('prod-img').value,
                body: document.getElementById('prod-body').value,
                sold: false
            };
            storedProducts.unshift(newProd);
            localStorage.setItem('romarket_prods', JSON.stringify(storedProducts));
            location.reload();
        }

        function renderProducts(category = 'all') {
            const grid = document.getElementById('market-grid');
            grid.innerHTML = '';
            const filtered = category === 'all' ? products : products.filter(p => p.cat === category);
            
            filtered.forEach(p => {
                const imgTag = p.img 
                    ? `<img src="${p.img}" class="w-full h-full object-cover">`
                    : `<div class="w-full h-full no-img-card flex flex-col items-center justify-center text-neutral-700">
                        <i class="fa-solid fa-code text-3xl mb-3 opacity-20"></i>
                        <span class="text-[9px] font-black uppercase tracking-widest italic opacity-40">Technical Asset</span>
                       </div>`;

                grid.innerHTML += `
                    <div class="glass p-6 rounded-[32px]" data-aos="fade-up">
                        <div class="aspect-video rounded-2xl overflow-hidden mb-6 border border-white/5 bg-neutral-900">
                            ${imgTag}
                        </div>
                        <div class="flex justify-between items-center mb-4 text-white">
                            <h3 class="font-black text-lg uppercase italic tracking-tighter">${p.name}</h3>
                            <span class="text-[8px] bg-white/5 px-2 py-1 rounded-lg uppercase font-black text-gray-400">${p.cat}</span>
                        </div>
                        <p class="text-gray-500 text-xs mb-8 h-8 overflow-hidden">${p.body}</p>
                        <div class="font-black text-xl italic text-white mb-8">${p.price}</div>
                        <a href="https://discord.gg/b5zmpYSuRf" class="block w-full bg-white text-black text-center py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-gray-200 transition">Buy Now</a>
                    </div>
                `;
            });
        }

        function filterCat(cat, btn) {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderProducts(cat);
        }
    </script>
</body>
</html>
